# service.yml — fill in these 5 fields, then push.
# This file tells the server how to expose your app.
#
# subdomain:      Your app will be at <subdomain>.suras.org
# container_name: Must match the container_name in docker-compose.yml
# internal_port:  Port your app listens on inside the container
# zone:           private = CF Access auth required | public = open internet
# category:       Dashboard category (default: Apps)

name: My App
container_name: my-app
internal_port: 8000
subdomain: myapp
zone: private
category: Apps
